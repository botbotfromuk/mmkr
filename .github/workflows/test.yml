name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps (minimal — tests only need stdlib + integrations)
          pip install pydantic anthropic 2>/dev/null || true

      - name: Run integration smoke tests
        run: python3 tests/test_integrations.py

      - name: Run with pytest (if available)
        run: |
          pip install pytest 2>/dev/null && python3 -m pytest tests/ -v || python3 tests/test_integrations.py
